{% extends "base.html" %}
{% block content %}
    <div style="background: #1F5161; padding: 2em; display: flex;">
        <div>
            {% for pokemon in pokemon_dict %}
                <div id="pokemon-{{loop.index}}" class="pokemon" style="display: flex; justify-content: space-between; align-items: center;">
                        <h2 style="padding-right: 2em;">No. {{loop.index}}</h2>
                        <a rel="prefetch" href='{{pokemon["href"]}}' style="padding-right: 2em;"><h2>{{pokemon["name"]}}</h2></a>
                        <div style="width: 10em; height: 10em; background-color: #D9D9D9;">
                            <img alt="sprite" src='{{pokemon["sprites"]["front_default"]}}' style="width: 100%; height: 100%;">
                        </div>
                    
                </div>
            {% endfor %}
            </div>
        <div class="pokeball" id="pokeball">
            <div class="pokeball_button"></div>
          </div>
    </div>
